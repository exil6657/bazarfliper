name: Build Bazaar Flipper

on:
  push:
    branches: [ "main", "arena/*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Set up Gradle 9.4.0
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.4.0'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle (Loom - unobfuscated 26.1.2)
        run: ./gradlew build --stacktrace

      - name: Upload JAR artifact
        uses: actions/upload-artifact@v4
        with:
          name: bazaar-flipper-jar
          path: build/libs/*.jar

      - name: List build libs
        run: ls -lh build/libs/
