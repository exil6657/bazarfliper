name: Build Bazaar Flipper
on:
  push:
    branches: [ "main", "arena/*", "fix/*" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 25 (required for MC 26.1.2)
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
      - name: Grant execute for gradlew
        run: chmod +x gradlew
      - name: Generate wrapper jar if missing
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            mkdir -p gradle/wrapper
            curl -L --retry 3 -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/master/gradle/wrapper/gradle-wrapper.jar || wget -O gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/master/gradle/wrapper/gradle-wrapper.jar
          fi
      - name: Setup Gradle 9.4.0 cache disabled
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.4.0'
          cache-disabled: true
      - name: Build
        run: ./gradlew build --stacktrace --no-daemon --info
      - name: List libs
        run: |
          ls -lh build/ || echo "No build dir"
          ls -lh build/libs/ || echo "No libs - check logs above for release version error"
      - name: Upload JAR
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bazaar-flipper-jar
          path: build/libs/*.jar
          if-no-files-found: warn
