name: Build Bazaar Flipper
on:
  push: { branches: [ "main", "arena/*", "fix/*" ] }
  pull_request: { branches: [ "main" ] }
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 21 (Loom 1.17.13 variant is Java 21, not 25)
        uses: actions/setup-java@v4
        with: { java-version: '21', distribution: 'temurin' }
      - name: Grant execute for gradlew
        run: chmod +x gradlew
      - name: Generate wrapper jar if missing (fixes No Gradle build results)
        run: |
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            mkdir -p gradle/wrapper
            curl -L --retry 3 -o gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/master/gradle/wrapper/gradle-wrapper.jar || wget -O gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/master/gradle/wrapper/gradle-wrapper.jar
          fi
      - name: Setup Gradle 9.5.0 (Loom 1.17.13 requires api 9.5.0, not 9.4.0, + cache disabled to avoid 400)
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '9.5.0'
          cache-disabled: true
      - name: Build (release 21, so JDK 21 can compile, jar will still run on MC 26.1.2 Java 25 runtime)
        run: ./gradlew build --stacktrace --no-daemon --info
      - name: List libs
        run: ls -lh build/libs/
      - name: Upload JAR
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bazaar-flipper-jar
          path: build/libs/*.jar
